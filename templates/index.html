<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather App</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="card">
    <div class="search">
        <input type="text" placeholder="Enter city name" spellcheck="false">
        <button>
            <img src="{{ url_for('static', filename='images/search.png') }}">
        </button>
    </div>

    <div class="weather hidden">
        <h1 class="temp"></h1>
        <h2 class="city"></h2>

        <div class="details">
            <div class="col">
                <img src="{{ url_for('static', filename='images/humidity.png') }}">
                <div>
                    <p class="humidity"></p>
                    <p>Humidity</p>
                </div>
            </div>

            <div class="col">
                <img src="{{ url_for('static', filename='images/wind.png') }}">
                <div>
                    <p class="wind"></p>
                    <p>Wind speed</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
